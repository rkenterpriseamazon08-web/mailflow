name: Send Campaign

on:
  workflow_dispatch:
    inputs:
      config:
        description: "Campaign config file"
        required: true
        default: "campaigns/campaign_config.yml"
      template:
        description: "Optional template override"
        required: false
        default: ""
      max_emails:
        description: "Maximum emails to process in this run"
        required: true
        default: "10"
      data_source_type:
        description: "Recipient source type"
        required: true
        type: choice
        options:
          - google_csv
          - local_csv
          - local_excel
        default: "google_csv"
      data_path:
        description: "Repo file path for local_csv/local_excel, for example data/recipients.xlsx"
        required: false
        default: "data/recipients_sample.csv"
      dry_run:
        description: "Run without sending real emails"
        required: true
        type: boolean
        default: true

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run campaign
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          SMTP_SECURITY: ${{ secrets.SMTP_SECURITY }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          DATA_SOURCE_TYPE: ${{ inputs.data_source_type }}
          DATA_SOURCE_PATH: ${{ inputs.data_path }}
        run: |
          echo "Running Mailflow commit: $(git rev-parse --short HEAD)"
          echo "dry_run input: ${{ inputs.dry_run }}"
          echo "max_emails input: ${{ inputs.max_emails }}"
          echo "config input: ${{ inputs.config }}"
          echo "data_source_type input: ${{ inputs.data_source_type }}"
          echo "data_path input: ${{ inputs.data_path }}"
          if [ "${{ inputs.data_source_type }}" = "google_csv" ] && [ -z "$GOOGLE_SHEET_CSV_URL" ]; then
            echo "::error::GOOGLE_SHEET_CSV_URL secret is missing."
            exit 1
          fi
          if [ -z "$SMTP_HOST" ] || [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASSWORD" ] || [ -z "$FROM_EMAIL" ]; then
            echo "::error::One or more SMTP secrets are missing."
            exit 1
          fi

          TEMPLATE_INPUT="${{ inputs.template }}"
          TEMPLATE_ARG=""
          if [ -n "$TEMPLATE_INPUT" ]; then
            TEMPLATE_ARG="--template $TEMPLATE_INPUT"
          fi

          DRY_RUN_ARG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi

          python scripts/mailflow.py \
            --mode campaign \
            --config "${{ inputs.config }}" \
            --max-emails "${{ inputs.max_emails }}" \
            $TEMPLATE_ARG \
            $DRY_RUN_ARG

      - name: Upload send logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mailflow-send-logs
          path: |
            logs/*.csv
            logs/*.txt
          if-no-files-found: ignore
