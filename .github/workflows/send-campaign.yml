name: Send Campaign

on:
  workflow_dispatch:
    inputs:
      config:
        description: "Campaign config file"
        required: true
        default: "campaigns/campaign_config.yml"
      template:
        description: "Optional template override"
        required: false
        default: ""
      max_emails:
        description: "Maximum emails to process in this run"
        required: true
        default: "10"
      dry_run:
        description: "Run without sending real emails"
        required: true
        type: boolean
        default: true

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run campaign
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        run: |
          TEMPLATE_INPUT="${{ inputs.template }}"
          TEMPLATE_ARG=""
          if [ -n "$TEMPLATE_INPUT" ]; then
            TEMPLATE_ARG="--template $TEMPLATE_INPUT"
          fi

          DRY_RUN_ARG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi

          python scripts/mailflow.py \
            --mode campaign \
            --config "${{ inputs.config }}" \
            --max-emails "${{ inputs.max_emails }}" \
            $TEMPLATE_ARG \
            $DRY_RUN_ARG

      - name: Upload send logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mailflow-send-logs
          path: logs/*.csv
          if-no-files-found: ignore
