name: MailFlow Runner

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        type: choice
        options:
          - init-sheet
          - import-file
          - send-initial
          - send-followup
      import_file:
        description: 'File path inside repo, e.g. imports/sample.csv'
        required: false
        default: 'imports/sample.csv'
      campaign_name:
        description: 'Campaign name'
        required: false
        default: 'Campaign A'
      template_file:
        description: 'Template JSON path, e.g. templates/initial.json'
        required: false
        default: 'templates/initial.json'
      followup_stage:
        description: 'Follow-up stage 1 to 10'
        required: false
        default: '1'
      retry_failed:
        description: 'Retry failed rows'
        required: false
        default: 'false'
      send_delay_ms:
        description: 'Delay between sends'
        required: false
        default: '1500'

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      MASTER_SHEET_ID: ${{ secrets.MASTER_SHEET_ID }}
      MASTER_SHEET_TAB: ${{ secrets.MASTER_SHEET_TAB }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
      SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
      IMPORT_FILE: ${{ github.event.inputs.import_file }}
      CAMPAIGN_NAME: ${{ github.event.inputs.campaign_name }}
      TEMPLATE_FILE: ${{ github.event.inputs.template_file }}
      FOLLOWUP_STAGE: ${{ github.event.inputs.followup_stage }}
      RETRY_FAILED: ${{ github.event.inputs.retry_failed }}
      SEND_DELAY_MS: ${{ github.event.inputs.send_delay_ms }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run selected task
        run: |
          if [ "${{ github.event.inputs.task }}" = "init-sheet" ]; then
            npm run init-sheet
          elif [ "${{ github.event.inputs.task }}" = "import-file" ]; then
            npm run import-file
          elif [ "${{ github.event.inputs.task }}" = "send-initial" ]; then
            npm run send-initial
          elif [ "${{ github.event.inputs.task }}" = "send-followup" ]; then
            npm run send-followup
          else
            echo "Unknown task"
            exit 1
          fi
