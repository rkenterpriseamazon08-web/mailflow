name: Send Follow-Ups

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without sending real emails"
        required: true
        type: boolean
        default: true
  schedule:
    - cron: "30 4 * * *"

jobs:
  followups:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send due follow-ups
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        run: |
          DRY_RUN_ARG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi

          python scripts/mailflow.py \
            --mode followups \
            --config campaigns/campaign_config.yml \
            --max-emails 25 \
            $DRY_RUN_ARG

      - name: Upload follow-up logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mailflow-followup-logs
          path: logs/*.csv
          if-no-files-found: ignore
